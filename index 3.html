};

/* ── Scaling logic helpers ────────────────────────────────── */
// A campaign uses Duplicate & Double only if its name contains $50, $100, or $200
// (these are Creative Ladder campaigns). All others use vertical scaling only.
function isDupDouble(name) {
  return /[$]50|[$]100|[$]200/.test(name);
}
function getScaleAction(campaign) {
  const {
    name,
    budget,
    status
  } = campaign;
  if (status !== "duplicate" && status !== "scale_vertical") return campaign.scaleAction;
  if (isDupDouble(name)) {
    const nextBudget = budget * 2;
    return `Duplicate & Double → $${nextBudget}/day`;
  } else {
    const newBudget = Math.round(budget * 1.09);
    return `Vertical scale → $${budget} → $${newBudget}/day (+9%)`;
  }
}
function getScaleStatus(campaign) {
  const {
    name
  } = campaign;
  if (campaign.status !== "duplicate" && campaign.status !== "scale_vertical") return campaign.status;
  return isDupDouble(name) ? "duplicate" : "scale_vertical";
}

function generateDailyData(range) {
  const days = {
    y: 1,
    d3: 3,
    d7: 7,
    d14: 14,
    d30: 30,
    custom: 14
  }[range] || 7;
  const today = new Date(2026, 2, 11); // Mar 11 2026
  const data = [];
  // Seed values that look realistic for Rebecca's account
  const baseSpend = 850;
  const baseRevenue = 1800;
  const baseRoas = 2.12;
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const label = days === 1 ? "Yesterday" : `${d.toLocaleString("en-US", {
      month: "short"
    })} ${d.getDate()}`;
    // Add some realistic variance
    const variance = 0.85 + Math.random() * 0.35;
    const variance2 = 0.80 + Math.random() * 0.45;
    const spend = Math.round(baseSpend * variance);
    const revenue = Math.round(baseRevenue * variance2);
    const roas = parseFloat((revenue / spend).toFixed(2));
    data.push({
      label,
      spend,
      revenue,
      roas,
      zero: 0,
      breakeven: 1.0,
      scaleThreshold: 1.4
    });
  }
  return data;
}
